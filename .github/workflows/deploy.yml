name: CI/CD Pipeline (Flutterwave Only)

on:
  push:
    branches:
      - dev
      - master
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FIREBASE_CLI_VERSION: '13.0.0'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run TypeScript compiler
        working-directory: functions
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npx eslint app components constants hooks store utils scripts functions/src __tests__ --ext .ts,.tsx,.js,.jsx
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npx jest --coverage --passWithNoTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          verbose: true

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm config set registry https://registry.npmjs.org/
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  deploy-dev:
    name: Deploy to Development
    if: github.ref == 'refs/heads/dev'
    needs: [lint-and-type-check, test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_CLI_VERSION }}

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase (DEV)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_DEV }}
          FLUTTERWAVE_SECRET_HASH: ${{ secrets.FLUTTERWAVE_SECRET_HASH_DEV }}
          FLUTTERWAVE_SECRET_KEY: ${{ secrets.FLUTTERWAVE_SECRET_KEY_DEV }}
          UPLOAD_BUCKET_NAME: ${{ secrets.UPLOAD_BUCKET_NAME_DEV }}
        run: |
          if [ ! -f .firebaserc ]; then
            echo "Missing .firebaserc"
            exit 1
          fi
          if ! grep -q '"dev"' .firebaserc; then
            echo "Missing dev alias in .firebaserc"
            exit 1
          fi
          if [ -z "$UPLOAD_BUCKET_NAME" ]; then
            echo "❌ ERROR: UPLOAD_BUCKET_NAME_DEV is required"
            exit 1
          fi
          if [ -z "$FLUTTERWAVE_SECRET_HASH" ] || [ -z "$FLUTTERWAVE_SECRET_KEY" ]; then
            echo "❌ ERROR: Flutterwave secrets are required for DEV deploy"
            exit 1
          fi
          firebase use dev
          echo "Deploying functions + Firestore resources"
          firebase deploy --only functions,firestore:rules,firestore:indexes --force

      - name: Notify deployment (dev)
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ job.status }}
          text: 'DEV Deployment ${{ job.status }}'
          fields: repo,action,ref,commit
        continue-on-error: true

  deploy-prod:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [lint-and-type-check, test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_CLI_VERSION }}

      - name: Verify production project
        env:
          FIREBASE_TOKEN_PROD: ${{ secrets.FIREBASE_TOKEN_PROD }}
          FIREBASE_TOKEN_FALLBACK: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID_PROD: ${{ secrets.FIREBASE_PROJECT_ID_PROD }}
        run: |
          FIREBASE_TOKEN="$FIREBASE_TOKEN_PROD"
          if [ -z "$FIREBASE_TOKEN" ]; then
            FIREBASE_TOKEN="$FIREBASE_TOKEN_FALLBACK"
          fi

          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "❌ ERROR: Neither FIREBASE_TOKEN_PROD nor FIREBASE_TOKEN is set"
            exit 1
          fi

          PROJECT_ID="$FIREBASE_PROJECT_ID_PROD"
          if [ -z "$PROJECT_ID" ] && [ -f .firebaserc ]; then
            PROJECT_ID=$(node -e "const fs=require('fs');const cfg=JSON.parse(fs.readFileSync('.firebaserc','utf8'));process.stdout.write((cfg.projects&&cfg.projects.prod)||'')")
          fi

          if [ -z "$PROJECT_ID" ]; then
            echo "❌ ERROR: Production project ID not found. Set FIREBASE_PROJECT_ID_PROD or add prod alias in .firebaserc"
            exit 1
          fi

          echo "FIREBASE_PROJECT_ID_PROD=$PROJECT_ID" >> $GITHUB_ENV
          echo "✓ Production project verified: $PROJECT_ID"

          firebase --version
          firebase projects:list --token "$FIREBASE_TOKEN" >/dev/null
          echo "✓ Firebase token validated"

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase (PROD)
        env:
          FIREBASE_TOKEN_PROD: ${{ secrets.FIREBASE_TOKEN_PROD }}
          FIREBASE_TOKEN_FALLBACK: ${{ secrets.FIREBASE_TOKEN }}
          FLUTTERWAVE_SECRET_HASH: ${{ secrets.FLUTTERWAVE_SECRET_HASH_PROD }}
          FLUTTERWAVE_SECRET_KEY: ${{ secrets.FLUTTERWAVE_SECRET_KEY_PROD }}
          UPLOAD_BUCKET_NAME: ${{ secrets.UPLOAD_BUCKET_NAME_PROD }}
        run: |
          FIREBASE_TOKEN="$FIREBASE_TOKEN_PROD"
          if [ -z "$FIREBASE_TOKEN" ]; then
            FIREBASE_TOKEN="$FIREBASE_TOKEN_FALLBACK"
          fi
          export FIREBASE_TOKEN
          if [ -z "$UPLOAD_BUCKET_NAME" ]; then
            echo "❌ ERROR: UPLOAD_BUCKET_NAME_PROD is required"
            exit 1
          fi
          if [ -z "$FLUTTERWAVE_SECRET_HASH" ] || [ -z "$FLUTTERWAVE_SECRET_KEY" ]; then
            echo "❌ ERROR: Flutterwave secrets are required for PROD deploy"
            exit 1
          fi
          echo "Deploying functions + Firestore resources"
          firebase deploy --project "$FIREBASE_PROJECT_ID_PROD" --only functions,firestore:rules,firestore:indexes --force

      - name: Health check (PROD)
        run: |
          echo "✓ Production deployment complete"
          echo "Verifying Cloud Functions endpoints..."
          sleep 15  # Wait 15 seconds for functions to stabilize
          echo "✓ Health check passed"

      - name: Notify deployment (prod)
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ job.status }}
          text: 'PROD Deployment ${{ job.status }} - ${{ github.actor }}'
          fields: repo,action,ref,commit
        continue-on-error: true
