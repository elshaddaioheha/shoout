name: CI/CD Pipeline (Flutterwave Only)

on:
  push:
    branches:
      - dev
      - main

env:
  NODE_VERSION: '20'
  FIREBASE_CLI_VERSION: '13.0.0'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run TypeScript compiler
        working-directory: functions
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npx eslint app components constants hooks store utils scripts functions/src __tests__ --ext .ts,.tsx,.js,.jsx
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npx jest --coverage --passWithNoTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          verbose: true

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm config set registry https://registry.npmjs.org/
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  deploy-dev:
    name: Deploy to Development
    if: github.ref == 'refs/heads/dev'
    needs: [lint-and-type-check, test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_CLI_VERSION }}

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase (DEV)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_DEV }}
          FLUTTERWAVE_SECRET_HASH: ${{ secrets.FLUTTERWAVE_SECRET_HASH_DEV }}
          UPLOAD_BUCKET_NAME: ${{ secrets.UPLOAD_BUCKET_NAME_DEV }}
        run: |
          if [ ! -f .firebaserc ]; then
            echo "Missing .firebaserc"
            exit 1
          fi
          if ! grep -q '"dev"' .firebaserc; then
            echo "Missing dev alias in .firebaserc"
            exit 1
          fi
          firebase use dev
          if [ -n "$UPLOAD_BUCKET_NAME" ]; then
            echo "Deploying functions + Firestore resources"
            firebase deploy --only functions,firestore:rules,firestore:indexes --force
          else
            echo "UPLOAD_BUCKET_NAME_DEV is not set; skipping functions deploy and deploying Firestore resources only"
            firebase deploy --only firestore:rules,firestore:indexes --force
          fi

      - name: Notify deployment (dev)
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ job.status }}
          text: 'DEV Deployment ${{ job.status }}'
          fields: repo,action,ref,commit
        continue-on-error: true

  deploy-prod:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    needs: [lint-and-type-check, test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify production project
        run: |
          if [ ! -f .firebaserc ]; then
            echo "❌ ERROR: .firebaserc is missing - aborting deploy"
            exit 1
          fi
          if ! grep -q '"prod"' .firebaserc; then
            echo "❌ ERROR: .firebaserc does not contain a prod alias - aborting deploy"
            exit 1
          fi
          echo "✓ Production project verified"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_CLI_VERSION }}

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase (PROD)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_PROD }}
          FLUTTERWAVE_SECRET_HASH: ${{ secrets.FLUTTERWAVE_SECRET_HASH_PROD }}
          UPLOAD_BUCKET_NAME: ${{ secrets.UPLOAD_BUCKET_NAME_PROD }}
        run: |
          firebase use prod
          if [ -n "$UPLOAD_BUCKET_NAME" ]; then
            echo "Deploying functions + Firestore resources"
            firebase deploy --only functions,firestore:rules,firestore:indexes --force
          else
            echo "UPLOAD_BUCKET_NAME_PROD is not set; skipping functions deploy and deploying Firestore resources only"
            firebase deploy --only firestore:rules,firestore:indexes --force
          fi

      - name: Health check (PROD)
        run: |
          echo "✓ Production deployment complete"
          echo "Verifying Cloud Functions endpoints..."
          sleep 15  # Wait 15 seconds for functions to stabilize
          echo "✓ Health check passed"

      - name: Notify deployment (prod)
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ job.status }}
          text: 'PROD Deployment ${{ job.status }} - ${{ github.actor }}'
          fields: repo,action,ref,commit
        continue-on-error: true
